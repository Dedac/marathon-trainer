<mat-toolbar color="primary" class="app-toolbar">
  <mat-icon>directions_run</mat-icon>
  <span class="toolbar-title">Marathon Training Planner</span>
  <span class="toolbar-spacer"></span>
  <button mat-icon-button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle navigation">
    <mat-icon>{{ menuOpen ? 'close' : 'menu' }}</mat-icon>
  </button>
</mat-toolbar>

<!-- Desktop nav -->
<nav class="desktop-nav">
  <a mat-button routerLink="/profile" routerLinkActive="active">Profile</a>
  <a mat-button routerLink="/generate" routerLinkActive="active">Generate Plan</a>
  <a mat-button routerLink="/plan" routerLinkActive="active">Training Plan</a>
  <a mat-button routerLink="/summary" routerLinkActive="active">Summary</a>
</nav>

<!-- Mobile slide-down nav -->
@if (menuOpen) {
  <nav class="mobile-nav">
    <a mat-button routerLink="/profile" routerLinkActive="active" (click)="closeMenu()">
      <mat-icon>person</mat-icon> Profile
    </a>
    <a mat-button routerLink="/generate" routerLinkActive="active" (click)="closeMenu()">
      <mat-icon>bolt</mat-icon> Generate Plan
    </a>
    <a mat-button routerLink="/plan" routerLinkActive="active" (click)="closeMenu()">
      <mat-icon>calendar_month</mat-icon> Training Plan
    </a>
    <a mat-button routerLink="/summary" routerLinkActive="active" (click)="closeMenu()">
      <mat-icon>bar_chart</mat-icon> Summary
    </a>
  </nav>
}

<main class="app-content">
  <router-outlet />
</main>
